<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>fnOS Dock Bottom</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #e9e9e9;
      --text: #222;
      --muted: #888;
      --card-bg: #fff;
      --card-border: #d4d4d4;
      --switch-off: #858585;
      --switch-on: #0066ff;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #171717;
        --text: #f3f4f6;
        --card-bg: #202020;
        --card-border: #343434;
        --muted: #8b8b8b;
      }
    }
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      width: 280px;
      padding: 16px;
      background: var(--card-bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .title {
      font-size: 14px;
      font-weight: 600;
    }
    .version {
      font-size: 12px;
      color: var(--muted);
    }
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0;
      border-top: 1px solid var(--card-border);
    }
    .label {
      font-size: 13px;
    }
    .desc {
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
    }
    .toggle {
      position: relative;
      width: 44px;
      height: 24px;
      background: var(--switch-off);
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .toggle.active {
      background: var(--switch-on);
    }
    .toggle::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 20px;
      height: 20px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    .toggle.active::after {
      transform: translateX(20px);
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="title">fnOS Dock Bottom</span>
    <span class="version">v1.0.0</span>
  </div>
  <div class="row">
    <div>
      <div class="label">Dock 栏到底部</div>
      <div class="desc">将 Dock 栏从左侧移到底部</div>
    </div>
    <div class="toggle" id="toggle" onclick="toggle()"></div>
  </div>
  <script>
    const STORAGE_KEY = 'fnos_dock_bottom_enabled';
    const toggle = document.getElementById('toggle');
    
    chrome.storage.local.get([STORAGE_KEY], (result) => {
      if (result[STORAGE_KEY]) {
        toggle.classList.add('active');
      }
    });
    
    function toggle() {
      const isActive = toggle.classList.toggle('active');
      chrome.storage.local.set({ [STORAGE_KEY]: isActive });
      chrome.tabs.query({ active: true, currentWindow: true }, (tabs) => {
        if (tabs[0]) {
          chrome.tabs.sendMessage(tabs[0].id, { action: 'toggle', enabled: isActive });
        }
      });
    }
  </script>
</body>
</html>
